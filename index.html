<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約ページ｜TANAKA's Cozy Beachside Home</title>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // =============================================
    // ★ 設定（Firebase・EmailJS の値を入れてください）
    // =============================================
    const firebaseConfig = {
      apiKey: "AIzaSyBp7jWNAvdT20k-q_MyzaT4MDKFMqdsj6M",
      authDomain: "mybookingsystem-6882c.firebaseapp.com",
      databaseURL: "https://mybookingsystem-6882c-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mybookingsystem-6882c",
      storageBucket: "mybookingsystem-6882c.firebasestorage.app",
      messagingSenderId: "565510902581",
      appId: "1:565510902581:web:e5a9a238028a1b0dc7727c"
    };

    const EMAILJS_SERVICE_ID  = "service_0e0jd8v";
    const EMAILJS_TEMPLATE_ID = "template_itgqkjh";
    const EMAILJS_PUBLIC_KEY  = "aUk62Y6jyfXBt4Qxw";
    const OWNER_EMAIL         = "yukgatatsu.tasutasu@gmail.com";
    const SITE_URL            = "https://yukatatsu.github.io/myhomebooking";
    // =============================================

    const app      = initializeApp(firebaseConfig);
    const db       = getDatabase(app);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ---- 状態 ----
    let bookedRanges = [];
    let selectStart  = null;
    let selectEnd    = null;
    let hoveredDate  = null;
    let currentUser  = null;
    let isDayVisit   = false;

    const MONTHS = [
      {year:2026,month:8},{year:2026,month:9},{year:2026,month:10},
      {year:2026,month:11},{year:2026,month:12},{year:2027,month:1},{year:2027,month:2}
    ];
    const JP_WD = ["日","月","火","水","木","金","土"];
    const JP_MO = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

    // ---- Firebase ----
    function loadBookings() {
      onValue(ref(db, "bookings"), (snap) => {
        bookedRanges = [];
        snap.forEach((child) => {
          const d = child.val();
          if (d.status !== "cancelled") {
            bookedRanges.push({ start: d.startDate, end: d.endDate, type: d.type || "stay" });
          }
        });
        renderCalendars();
      });
    }

    // ---- Google ログイン ----
    async function handleSignIn() {
      try { await signInWithPopup(auth, provider); } catch (e) { console.error(e); }
    }
    async function handleSignOut() { await signOut(auth); }

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      const btn  = document.getElementById("auth-btn");
      const info = document.getElementById("user-info");
      if (user) {
        btn.textContent    = "ログアウト";
        btn.onclick        = handleSignOut;
        info.textContent   = `${user.displayName} さん`;
        info.style.display = "inline";
      } else {
        btn.textContent    = "Googleでログイン";
        btn.onclick        = handleSignIn;
        info.style.display = "none";
      }
    });

    // ---- 日付ユーティリティ ----
    function toDateStr(y, m, d) {
      return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    }
    function addDays(dateStr, n) {
      const d = new Date(dateStr);
      d.setDate(d.getDate() + n);
      return d.toISOString().slice(0,10);
    }
    function isBlocked(dateStr) {
      return bookedRanges.some(r => {
        const bufferEnd = addDays(r.end, 1);
        return dateStr >= r.start && dateStr <= bufferEnd;
      });
    }
    function isInSelectionRange(dateStr) {
      if (!selectStart) return false;
      const end = selectEnd || hoveredDate;
      if (!end) return false;
      const lo = selectStart <= end ? selectStart : end;
      const hi = selectStart <= end ? end : selectStart;
      return dateStr > lo && dateStr < hi;
    }
    function hasBlockedInRange(start, end) {
      const lo = start <= end ? start : end;
      const hi = start <= end ? end : start;
      return bookedRanges.some(r => {
        const bufferEnd = addDays(r.end, 1);
        return r.start <= hi && bufferEnd >= lo;
      });
    }

    // ---- カレンダー描画 ----
    function renderCalendars() {
      const container = document.getElementById("calendars");
      container.innerHTML = "";
      MONTHS.forEach(({ year, month }) => container.appendChild(buildMonthEl(year, month)));
    }

    function buildMonthEl(year, month) {
      const wrap = document.createElement("div");
      wrap.className = "month-block";
      const title = document.createElement("div");
      title.className = "month-title";
      title.textContent = `${year}年 ${JP_MO[month-1]}`;
      wrap.appendChild(title);

      const grid = document.createElement("div");
      grid.className = "cal-grid";
      JP_WD.forEach((w,i) => {
        const h = document.createElement("div");
        h.className = "cal-header" + (i===0?" sun":i===6?" sat":"");
        h.textContent = w;
        grid.appendChild(h);
      });

      const firstDay = new Date(year, month-1, 1).getDay();
      for (let i=0; i<firstDay; i++) {
        const b = document.createElement("div");
        b.className = "cal-cell empty";
        grid.appendChild(b);
      }

      const daysInMonth = new Date(year, month, 0).getDate();
      for (let d=1; d<=daysInMonth; d++) {
        const ds      = toDateStr(year, month, d);
        const wd      = new Date(year, month-1, d).getDay();
        const blocked = isBlocked(ds);
        const inRange = isInSelectionRange(ds);
        const isEdge  = ds === selectStart || ds === (selectEnd || hoveredDate);

        const cell = document.createElement("div");
        let cls = "cal-cell";
        if (blocked)      cls += " booked";
        else if (isEdge)  cls += " selected-edge";
        else if (inRange) cls += " in-range";
        else              cls += " available";
        if (wd===0) cls += " sun";
        if (wd===6) cls += " sat";
        cell.className    = cls;
        cell.dataset.date = ds;

        const num  = document.createElement("span");
        num.className   = "day-num";
        num.textContent = d;
        const mark = document.createElement("span");
        mark.className   = "day-mark";
        mark.textContent = blocked ? "×" : "○";
        cell.appendChild(num);
        cell.appendChild(mark);
        grid.appendChild(cell);
      }

      wrap.appendChild(grid);
      return wrap;
    }

    function handleCellClick(ds) {
      if (isDayVisit) {
        selectStart = ds; selectEnd = ds;
        renderCalendars();
        openModal();
        return;
      }
      if (!selectStart || selectEnd) {
        selectStart = ds; selectEnd = null; hoveredDate = null;
        renderCalendars();
        showToast(`チェックイン: ${formatJP(ds)}　→ 次にチェックアウト日をクリック`, "info");
        updateCancelBtn(true);
      } else {
        const lo = selectStart <= ds ? selectStart : ds;
        const hi = selectStart <= ds ? ds : selectStart;
        if (hasBlockedInRange(lo, hi)) {
          showToast("選択した期間に予約済みの日が含まれています。", "error");
          selectStart = null; selectEnd = null; renderCalendars();
          updateCancelBtn(false); return;
        }
        selectStart = lo; selectEnd = hi;
        updateCancelBtn(false);
        renderCalendars();
        openModal();
      }
    }

    // ---- モーダル ----
    function openModal() {
      const nights = calcNights(selectStart, selectEnd);
      document.getElementById("modal-start").textContent  = formatJP(selectStart);
      document.getElementById("modal-end").textContent    = formatJP(selectEnd);
      document.getElementById("modal-nights").textContent =
        isDayVisit ? "（日帰り）" : `（${nights}泊${nights+1}日）`;
      if (currentUser) {
        document.getElementById("f-name").value  = currentUser.displayName || "";
        document.getElementById("f-email").value = currentUser.email || "";
      }
      document.getElementById("modal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      document.getElementById("booking-form").reset();
      selectStart = null; selectEnd = null;
      updateCancelBtn(false);
      renderCalendars();
    }

    function updateCancelBtn(show) {
      const btn = document.getElementById("cancel-selection-btn");
      if (btn) btn.style.display = show ? "inline-flex" : "none";
    }

    function formatJP(str) {
      const [y,m,d] = str.split("-");
      return `${y}年${parseInt(m)}月${parseInt(d)}日`;
    }
    function calcNights(s, e) {
      return Math.round((new Date(e) - new Date(s)) / 86400000);
    }

    // ---- 予約送信 ----
    async function submitBooking(ev) {
      ev.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true; btn.textContent = "送信中...";

      const name   = document.getElementById("f-name").value.trim();
      const email  = document.getElementById("f-email").value.trim();
      const guests = document.getElementById("f-guests").value;
      const notes  = document.getElementById("f-notes").value.trim();

      if (hasBlockedInRange(selectStart, selectEnd)) {
        showToast("この期間は既に予約が入りました。別の日程を選んでください。", "error");
        closeModal(); btn.disabled=false; btn.textContent="予約を確定する"; return;
      }

      const data = {
        name, email, guests: parseInt(guests), notes,
        startDate: selectStart, endDate: selectEnd,
        nights: calcNights(selectStart, selectEnd),
        type: isDayVisit ? "dayvisit" : "stay",
        bookedAt: new Date().toISOString(),
        status: "confirmed"
      };

      try {
        const newRef = push(ref(db, "bookings"));
        await set(newRef, data);

        let emailOk = false;
        try {
          await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
            to_email:    email,
            owner_email: OWNER_EMAIL,
            guest_name:  name,
            start_date:  formatJP(selectStart),
            end_date:    formatJP(selectEnd),
            type:        isDayVisit ? "日帰り訪問" : `${data.nights}泊${data.nights+1}日の宿泊`,
            guests:      guests,
            notes:       notes || "なし",
            booking_id:  newRef.key,
            cancel_link: `${SITE_URL}/mybooking.html?id=${newRef.key}`
          }, EMAILJS_PUBLIC_KEY);
          emailOk = true;
        } catch (mailErr) { console.warn("EmailJS error:", mailErr); }

        closeModal();
        if (emailOk) {
          showToast(`予約完了！確認メールを ${email} へ送りました。`, "success");
        } else {
          showToast(`予約は保存されました。※確認メールの送信に失敗しました。`, "warn");
        }
      } catch (err) {
        console.error(err);
        showToast("予約の保存に失敗しました。もう一度お試しください。", "error");
        btn.disabled=false; btn.textContent="予約を確定する";
      }
    }

    // ---- トースト ----
    function showToast(msg, type) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.className = `toast show ${type}`;
      setTimeout(() => t.className="toast", 4500);
    }

    // ---- 初期化 ----
    window.addEventListener("DOMContentLoaded", () => {
      emailjs.init(EMAILJS_PUBLIC_KEY);
      loadBookings();

      document.getElementById("booking-form").addEventListener("submit", submitBooking);
      document.getElementById("modal-close").addEventListener("click", closeModal);
      document.getElementById("modal-overlay").addEventListener("click", closeModal);
      document.getElementById("cancel-selection-btn").addEventListener("click", () => {
        selectStart = null; selectEnd = null; hoveredDate = null;
        updateCancelBtn(false);
        renderCalendars();
      });

      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          isDayVisit = btn.dataset.mode === "day";
          document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectStart = null; selectEnd = null;
          renderCalendars();
          document.getElementById("guide-text").textContent = isDayVisit
            ? "日帰り訪問したい日を1日クリックするだけで予約できます"
            : "チェックイン日をクリック → チェックアウト日をクリックして日程を選んでください";
        });
      });

      const calContainer = document.getElementById("calendars");
      calContainer.addEventListener("click", (e) => {
        const cell = e.target.closest('.cal-cell');
        if (!cell || cell.classList.contains('booked') || cell.classList.contains('empty')) return;
        handleCellClick(cell.dataset.date);
      });
      calContainer.addEventListener("mouseover", (e) => {
        const cell = e.target.closest('.cal-cell');
        const ds = cell?.dataset?.date;
        if (!ds || cell.classList.contains('booked') || cell.classList.contains('empty')) return;
        if (ds !== hoveredDate) {
          hoveredDate = ds;
          if (selectStart && !selectEnd && !isDayVisit) renderCalendars();
        }
      });
      calContainer.addEventListener("mouseleave", () => {
        if (hoveredDate !== null) {
          hoveredDate = null;
          if (selectStart && !selectEnd && !isDayVisit) renderCalendars();
        }
      });

      // 写真グリッドのオーバーレイボタン
      document.getElementById("photos-btn")?.addEventListener("click", () => {
        document.getElementById("photo-modal").classList.remove("hidden");
      });
      document.getElementById("photo-modal-close")?.addEventListener("click", () => {
        document.getElementById("photo-modal").classList.add("hidden");
      });
      document.getElementById("photo-modal-overlay")?.addEventListener("click", () => {
        document.getElementById("photo-modal").classList.add("hidden");
      });
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #FF385C;
      --dark:   #222222;
      --mid:    #717171;
      --border: #DDDDDD;
      --bg:     #F7F7F7;
      --white:  #FFFFFF;
      --green:  #008A05;
    }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", -apple-system, sans-serif;
      background: var(--white); color: var(--dark);
    }

    /* ===== NAVBAR ===== */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      font-size: 1.2rem; font-weight: 800;
      color: var(--dark); text-decoration: none; letter-spacing: -.01em;
    }
    .nav-auth { display: flex; align-items: center; gap: 10px; }
    #user-info {
      font-size: .82rem; color: var(--mid);
      background: var(--bg); padding: 5px 12px; border-radius: 20px;
    }
    #auth-btn {
      padding: 8px 16px; border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--white); color: var(--dark);
      font-size: .85rem; cursor: pointer; font-family: inherit;
      font-weight: 600; transition: box-shadow .15s;
    }
    #auth-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }

    /* ===== PHOTO GRID ===== */
    .photo-section { max-width: 1120px; margin: 24px auto 0; padding: 0 24px; }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 240px 240px;
      gap: 8px; border-radius: 16px; overflow: hidden;
      position: relative;
    }
    .photo-grid img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .photo-main {
      grid-row: 1 / 3;
    }
    .photo-side {
      display: grid; grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr; gap: 8px;
    }
    .photo-side img { border-radius: 0; }
    .photo-side img:nth-child(2) { border-top-right-radius: 0; }
    .photo-side img:nth-child(4) { border-bottom-right-radius: 0; }

    .photos-btn-wrap {
      position: absolute; bottom: 14px; right: 14px;
    }
    #photos-btn {
      background: var(--white); border: 1.5px solid var(--dark);
      border-radius: 8px; padding: 7px 14px;
      font-size: .8rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .15s;
      display: flex; align-items: center; gap: 5px;
    }
    #photos-btn:hover { background: var(--bg); }

    /* Mobile: only show main photo */
    @media (max-width: 640px) {
      .photo-grid {
        grid-template-columns: 1fr;
        grid-template-rows: 260px;
      }
      .photo-main { grid-row: auto; }
      .photo-side { display: none; }
    }

    /* ===== LISTING HEADER ===== */
    .listing-section { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

    .listing-header {
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .listing-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .listing-meta  { font-size: .88rem; color: var(--mid); }

    .listing-features {
      display: flex; gap: 28px; flex-wrap: wrap;
      padding: 24px 0; border-bottom: 1px solid var(--border);
    }
    .feature-item {
      display: flex; align-items: center; gap: 12px;
    }
    .feature-icon { font-size: 1.5rem; }
    .feature-text h4 { font-size: .9rem; font-weight: 600; }
    .feature-text p  { font-size: .8rem; color: var(--mid); margin-top: 1px; }

    .listing-desc {
      padding: 24px 0; border-bottom: 1px solid var(--border);
      font-size: .92rem; line-height: 1.7; color: #444;
    }

    /* ===== BOOKING SECTION ===== */
    .booking-section {
      padding: 28px 0 60px;
    }
    .booking-section h2 {
      font-size: 1.3rem; font-weight: 700; margin-bottom: 6px;
    }
    .booking-period {
      font-size: .85rem; color: var(--mid); margin-bottom: 20px;
    }

    /* mode toggle */
    .mode-toggle {
      display: inline-flex; border: 1.5px solid var(--border);
      border-radius: 10px; overflow: hidden; margin-bottom: 16px;
    }
    .mode-btn {
      padding: 9px 22px; background: var(--white); color: var(--mid);
      border: none; font-size: .88rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .mode-btn.active {
      background: var(--dark); color: var(--white);
    }
    .mode-btn:first-child { border-radius: 8px 0 0 8px; }
    .mode-btn:last-child  { border-radius: 0 8px 8px 0; }

    /* guide + cancel btn */
    .guide-row {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 16px; min-height: 32px;
    }
    #guide-text { font-size: .84rem; color: var(--mid); }
    #cancel-selection-btn {
      display: none; align-items: center; gap: 4px;
      padding: 5px 12px; border-radius: 20px;
      border: 1.5px solid #E63946; background: var(--white);
      color: #E63946; font-size: .8rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    #cancel-selection-btn:hover { background: #FEE2E2; }

    /* legend */
    .legend {
      display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: .82rem; color: var(--mid); }
    .legend-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; border: 1.5px solid transparent;
    }
    .legend-dot.avail  { background: #F7F7F7; border-color: var(--border); color: var(--green); }
    .legend-dot.booked { background: #FEE2E2; color: #E63946; }

    /* ===== CALENDAR ===== */
    #calendars {
      display: flex; flex-wrap: wrap; gap: 16px;
    }
    .month-block {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px; min-width: 268px;
    }
    .month-title {
      text-align: center; font-size: .95rem; font-weight: 700;
      margin-bottom: 12px; color: var(--dark);
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
    }
    .cal-header {
      text-align: center; font-size: .68rem; font-weight: 700;
      color: var(--mid); padding: 3px 0 6px;
    }
    .cal-header.sun { color: #E63946; }
    .cal-header.sat { color: #1D4ED8; }

    .cal-cell {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; border-radius: 50%;
      padding: 4px 2px; min-height: 46px;
      font-size: .75rem; line-height: 1.2;
      transition: background .1s; aspect-ratio: 1;
    }
    .cal-cell.empty { background: transparent; border-radius: 0; }
    .day-num  { font-size: .66rem; color: #bbb; }
    .day-mark { font-size: .88rem; font-weight: 700; }

    .cal-cell.available        { cursor: pointer; }
    .cal-cell.available:hover  { background: var(--bg); }
    .cal-cell.available .day-mark { color: var(--green); }
    .cal-cell.booked           { background: #FEF2F2; cursor: not-allowed; border-radius: 6px; }
    .cal-cell.booked .day-mark { color: #E63946; }

    .cal-cell.in-range        { background: #FCE7EB; border-radius: 0; cursor: pointer; }
    .cal-cell.in-range .day-mark { color: var(--red); }

    .cal-cell.selected-edge   { background: var(--dark); cursor: pointer; }
    .cal-cell.selected-edge .day-num,
    .cal-cell.selected-edge .day-mark { color: var(--white) !important; }

    .cal-cell.sun .day-num { color: #E63946; }
    .cal-cell.sat .day-num { color: #1D4ED8; }

    /* ===== MODAL ===== */
    #modal.hidden { display: none; }
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 100; display: flex; align-items: center; justify-content: center;
    }
    .modal-box {
      background: var(--white); border-radius: 16px;
      padding: 28px 24px 24px; width: min(480px, 94vw);
      position: relative; z-index: 101;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }
    .modal-box h2 {
      font-size: 1.1rem; font-weight: 700;
      color: var(--dark); margin-bottom: 4px;
    }
    .modal-box .dates-summary {
      font-size: .85rem; color: var(--mid); margin-bottom: 20px;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    #modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; font-size: 1.2rem;
      cursor: pointer; color: var(--mid); width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: background .15s;
    }
    #modal-close:hover { background: var(--bg); }

    .google-prefill-note {
      background: #F0FDF4; border: 1px solid #BBF7D0;
      border-radius: 8px; padding: 8px 12px; margin-bottom: 14px;
      font-size: .8rem; color: #166534;
    }
    .form-group        { margin-bottom: 14px; }
    .form-group label  { display: block; font-size: .8rem; font-weight: 600; color: var(--dark); margin-bottom: 4px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: .88rem; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none; border-color: var(--dark);
      box-shadow: 0 0 0 3px rgba(34,34,34,.08);
    }
    .form-group textarea { resize: vertical; min-height: 68px; }

    #submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(to right, #E61E4D, #E31C5F, #D70466);
      color: var(--white); border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: opacity .2s; letter-spacing: .01em;
    }
    #submit-btn:hover:not(:disabled) { opacity: .9; }
    #submit-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ===== PHOTO MODAL ===== */
    #photo-modal.hidden { display: none; }
    #photo-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.9);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; padding: 20px;
      overflow-y: auto;
    }
    #photo-modal-close {
      position: fixed; top: 16px; right: 20px;
      background: rgba(255,255,255,.15); border: none;
      color: white; font-size: 1.4rem; cursor: pointer;
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 201;
    }
    .photo-modal-img {
      max-width: min(900px, 96vw); border-radius: 10px; display: block;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--dark); color: var(--white);
      padding: 12px 22px; border-radius: 24px;
      font-size: .88rem; opacity: 0; transition: opacity .3s;
      pointer-events: none; z-index: 300; max-width: 90vw;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    .toast.show    { opacity: 1; }
    .toast.success { background: #008A05; }
    .toast.error   { background: #E63946; }
    .toast.warn    { background: #B45309; }
    .toast.info    { background: #1D4ED8; }

    footer {
      text-align: center; padding: 32px 20px;
      font-size: .76rem; color: #AAAAAA;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav>
    <span class="nav-logo">TANAKA's Cozy Beachside Home</span>
    <div class="nav-auth">
      <span id="user-info" style="display:none"></span>
      <button id="auth-btn">Googleでログイン</button>
    </div>
  </nav>

  <!-- ===== PHOTO GRID ===== -->
  <div class="photo-section">
    <div class="photo-grid">
      <!-- メイン写真（大） -->
      <div class="photo-main">
        <img src="images/photo1.jpg" alt="ウッドデッキ・BBQスペース" fetchpriority="high">
      </div>
      <!-- サブ写真（2×2） -->
      <div class="photo-side">
        <img src="images/photo2.jpg" alt="リビング" loading="lazy" decoding="async">
        <img src="images/photo3.jpg" alt="外観" loading="lazy" decoding="async">
        <img src="images/photo4.jpg" alt="近くの海・サンセット" loading="lazy" decoding="async">
        <img src="images/photo5.jpg" alt="近くのビーチ" loading="lazy" decoding="async">
      </div>
      <!-- すべての写真ボタン -->
      <div class="photos-btn-wrap">
        <button id="photos-btn">🖼️ すべての写真</button>
      </div>
    </div>
  </div>

  <!-- ===== LISTING HEADER ===== -->
  <div class="listing-section">
    <!-- ===== BOOKING SECTION ===== -->
    <div class="booking-section">
      <h2>日程を選択して予約</h2>
      <p class="booking-period">予約可能期間: 2026年8月〜2027年2月</p>

      <!-- 宿泊 / 日帰り トグル -->
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="stay">🛏️ 宿泊</button>
        <button class="mode-btn" data-mode="day">🚗 日帰り</button>
      </div>

      <div class="guide-row">
        <p id="guide-text">チェックイン日をクリック → チェックアウト日をクリックして日程を選んでください</p>
        <button id="cancel-selection-btn">✕ 選択をやめる</button>
      </div>

      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot avail">○</div> 空き
        </div>
        <div class="legend-item">
          <div class="legend-dot booked">×</div> 予約済み
        </div>
      </div>

      <div id="calendars">
        <p style="color:#bbb;padding:40px;text-align:center;font-size:.9rem;">カレンダーを読み込み中...</p>
      </div>
    </div>
  </div>

  <!-- ===== 予約モーダル ===== -->
  <div id="modal" class="hidden">
    <div id="modal-overlay">
      <div class="modal-box" onclick="event.stopPropagation()">
        <button id="modal-close" aria-label="閉じる">✕</button>
        <h2>予約内容の入力</h2>
        <p class="dates-summary">
          <strong id="modal-start"></strong> 〜 <strong id="modal-end"></strong>
          <span id="modal-nights"></span>
        </p>
        <div class="google-prefill-note" id="prefill-note" style="display:none">
          ✅ Googleアカウントから名前・メールを自動入力しました
        </div>
        <form id="booking-form">
          <div class="form-group">
            <label for="f-name">お名前 <span style="color:#E63946">*</span></label>
            <input id="f-name" type="text" required placeholder="山田 太郎">
          </div>
          <div class="form-group">
            <label for="f-email">メールアドレス <span style="color:#E63946">*</span></label>
            <input id="f-email" type="email" required placeholder="example@email.com">
          </div>
          <div class="form-group">
            <label for="f-guests">人数 <span style="color:#E63946">*</span></label>
            <select id="f-guests" required>
              <option value="">選択してください</option>
              <option value="1">1名</option>
              <option value="2">2名</option>
              <option value="3">3名</option>
              <option value="4">4名</option>
              <option value="5">5名</option>
              <option value="6">6名以上</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-notes">メモ・連絡事項</label>
            <textarea id="f-notes" placeholder="到着時間や特記事項があればご記入ください"></textarea>
          </div>
          <button type="submit" id="submit-btn">予約を確定する</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== 写真モーダル ===== -->
  <div id="photo-modal" class="hidden">
    <div id="photo-modal-overlay">
      <button id="photo-modal-close">✕</button>
      <img class="photo-modal-img" src="images/photo1.jpg" alt="ウッドデッキ">
      <img class="photo-modal-img" src="images/photo2.jpg" alt="リビング">
      <img class="photo-modal-img" src="images/photo3.jpg" alt="外観">
      <img class="photo-modal-img" src="images/photo4.jpg" alt="サンセット">
      <img class="photo-modal-img" src="images/photo5.jpg" alt="ビーチ">
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- prefill-note 表示制御 -->
  <script type="module">
    const observer = new MutationObserver(() => {
      const modal   = document.getElementById("modal");
      const note    = document.getElementById("prefill-note");
      const nameVal = document.getElementById("f-name").value;
      note.style.display = (!modal.classList.contains("hidden") && nameVal) ? "block" : "none";
    });
    observer.observe(document.getElementById("modal"), { attributes: true, attributeFilter: ["class"] });
  </script>

  <footer>© 2026 ゆか家 · プライベート予約フォーム</footer>
</body>
</html>
